name: LiveStream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Debug: List repo files
        run: ls -R

      - name: Run extractor
        run: python core/platforms/extract_stream.py

      - name: Commit stream
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add streams.link
          git commit -m "update stream" || echo "No changes"
          git push
