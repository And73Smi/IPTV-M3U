- name: Check channels
  run: python ./check_m3u.py
on: [push]

jobs:
  check-m3u:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    - name: Install dependencies
      run: pip install requests m3u8
    - name: Check channels
      run: python ./path/to/your/script.py
